        function previewSignature(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('signaturePreview');
                    const img = document.getElementById('signatureImg');
                    img.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function addRow() {
            rowCount++;
            const tableBody = document.getElementById('tableBody');
            const newRow = document.createElement('tr');

            newRow.innerHTML = `
                <td class="row-number">${rowCount}</td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><select><option value="">Select</option><option value="YES">YES</option><option value="NO">NO</option></select></td>
                <td><textarea rows="2"></textarea></td>
            `;

            tableBody.appendChild(newRow);
            showMessage('Row added successfully!', 'success');
        }

        function updateRowNumbers() {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row, index) => {
                row.querySelector('.row-number').textContent = index + 1;
            });
            rowCount = rows.length;
        }

        function submitForm() {
            const rows = document.querySelectorAll('#tableBody tr');
            const data = [];
            let isValid = true;

            // Get additional form fields
            const otherRemarks = document.getElementById('otherRemarks').value || '';
            const formDate = document.getElementById('formDate').value || '';
            const formTime = document.getElementById('formTime').value || '';
            const formPlace = document.getElementById('formPlace').value || '';
            const cliNameSelect = document.getElementById('cliName');
            const cliName = cliNameSelect.options[cliNameSelect.selectedIndex].value || '';

            // Validate required fields
            if (!formDate) {
                showMessage('Please select a date!', 'error');
                return;
            }

            if (!cliName) {
                showMessage('Please select CLI Name and HQ!', 'error');
                return;
            }

            rows.forEach((row, index) => {
                const cells = row.querySelectorAll('input, select, textarea');
                const rowData = {
                    sno: index + 1,
                    name: cells[0].value,
                    crewId: cells[1].value,
                    designation: cells[2].value,
                    callLogs: cells[3].value,
                    mobileStatus: cells[4].value,
                    callingTime: cells[5].value,
                    remarks: cells[6].value
                };

                data.push(rowData);
            });

            // Prepare payload for Google Apps Script
            const payload = {
                formDate: formDate,
                formTime: formTime,
                formPlace: formPlace,
                cliName: cliName,
                otherRemarks: otherRemarks,
                tableData: data
            };

            console.log('Submitting Data:', payload);
            showMessage('Submitting data to Google Sheets...', 'success');

            // Submit to Google Apps Script
            fetch('https://script.google.com/macros/s/AKfycbw4Lyf8w03rCLsQNvvcezkMNZ5D1lW0oyMl4tyndhCq-GeUnvGXPPHXOpAa4LMG9Fnn5Q/exec', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                showMessage('Data submitted successfully to Google Sheets!', 'success');
                console.log('Submission successful!');
            })
            .catch((error) => {
                console.error('Error:', error);
                showMessage('Error submitting data. Please try again.', 'error');
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4'); // Portrait orientation
            const pageWidth = doc.internal.pageSize.getWidth();

            // Get form field values
            const formDate = document.getElementById('formDate').value || '';
            const formTime = document.getElementById('formTime').value || '';
            const formPlace = document.getElementById('formPlace').value || '';

            // Add title
            doc.setFontSize(14);
            doc.setFont(undefined, 'bold');
            doc.text('RS VALVE HOLDING BY ALP WHILE APPROACHING', pageWidth / 2, 14, { align: 'center' });
            doc.text('DANGER SIGNAL AMBUSH REPORT', pageWidth / 2, 20, { align: 'center' });

            // Add subtitle
            doc.setFontSize(12);
            doc.setFont(undefined, 'normal');
            doc.text('Raipur Division', pageWidth / 2, 26, { align: 'center' });

            // Add full line below Raipur Division
            doc.setLineWidth(0.5);
            doc.setDrawColor(74, 144, 226);
            doc.line(14, 28, pageWidth - 14, 28);

            // ── Info fields just below heading (no borders, plain text) ──
            doc.setFontSize(9);
            doc.setFont(undefined, 'bold');
            let infoY = 35;
            const col1X = 14;
            const col2X = pageWidth / 2 + 5;

            // Row 1: Date | Time
            doc.text('DATE:', col1X, infoY);
            doc.setFont(undefined, 'bold');
            doc.text(formDate, col1X + 12, infoY);

            doc.setFont(undefined, 'bold');
            doc.text('TIME:', col2X, infoY);
            doc.setFont(undefined, 'bold');
            doc.text(formTime, col2X + 12, infoY);

            // Row 2: Place only
            infoY += 6;
            doc.setFont(undefined, 'bold');
            doc.text('PLACE:', col1X, infoY);
            doc.setFont(undefined, 'bold');
            doc.text(formPlace, col1X + 14, infoY);

            // Get table data
            const rows = document.querySelectorAll('#tableBody tr');
            const tableData = [];

            rows.forEach((row) => {
                const cells = row.querySelectorAll('input, select, textarea');
                const rowNumber = row.querySelector('.row-number').textContent;

                tableData.push([
                    rowNumber,
                    cells[0].value || '',
                    cells[1].value || '',
                    cells[2].value || '',
                    cells[3].value || '',
                    cells[4].value || '',
                    cells[5].value || '',
                    cells[6].value || ''
                ]);
            });

            // Generate table
            doc.autoTable({
                head: [['S/No.', 'Train No', 'Loco No', 'UP/DN', 'Line No', 'Arrival', 'RS Holding', 'Remarks']],
                body: tableData,
                startY: 48,
                theme: 'grid',
                headStyles: {
                    fillColor: [74, 144, 226],
                    textColor: [255, 255, 255],
                    fontStyle: 'bold',
                    halign: 'center',
                    fontSize: 9
                },
                styles: {
                    fontSize: 8,
                    cellPadding: 2.5,
                    halign: 'center'
                },
                columnStyles: {
                    0: { cellWidth: 10 },
                    1: { cellWidth: 30 },
                    2: { cellWidth: 18 },
                    3: { cellWidth: 18 },
                    4: { cellWidth: 30 },
                    5: { cellWidth: 25 },
                    6: { cellWidth: 18 },
                    7: { cellWidth: 41, fontStyle: 'bold' }
                },
                alternateRowStyles: {
                    fillColor: [240, 248, 255]
                }
            });

            // Get the Y position after the table
            let yPosition = doc.lastAutoTable.finalY + 10;

            // Get Other Remarks
            const otherRemarks = document.getElementById('otherRemarks').value || '';

            // Add Other Remarks if any with outlined box
            doc.setFontSize(10);
            doc.setFont(undefined, 'bold');
            doc.text('Other Remarks if any:', 14, yPosition);

            // Draw outlined box for Other Remarks
            const boxHeight = 15;
            const boxWidth = 180;
            doc.setDrawColor(74, 144, 226);
            doc.setLineWidth(0.5);
            doc.rect(14, yPosition + 2, boxWidth, boxHeight);

            // Add text inside the box
            if (otherRemarks) {
                doc.setFont(undefined, 'normal');
                const splitOtherRemarks = doc.splitTextToSize(otherRemarks, boxWidth - 4);
                doc.text(splitOtherRemarks, 16, yPosition + 7);
            }

            yPosition += boxHeight + 12;

            // Get CLI Name and Signature
            const cliNameSelect = document.getElementById('cliName');
            const cliName = cliNameSelect.options[cliNameSelect.selectedIndex].value || '';
            const signatureFile = document.getElementById('signature').files[0];

            // Add Signature if uploaded
            if (signatureFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgData = e.target.result;
                    const pageWidth = doc.internal.pageSize.getWidth();

                    // Add signature on the right side
                    doc.setFontSize(10);
                    doc.setFont(undefined, 'bold');
                    doc.text('Signature:', pageWidth - 54, yPosition);
                    doc.addImage(imgData, 'PNG', pageWidth - 54, yPosition + 2, 40, 15);

                    // Add Date and CLI Name after signature
                    addDateAndCLI();
                    saveDocument();
                };
                reader.readAsDataURL(signatureFile);
            } else {
                // Add Date and CLI Name without signature
                addDateAndCLI();
                saveDocument();
            }

            function addDateAndCLI() {
                const pgWidth = doc.internal.pageSize.getWidth();

                // If signature was added, move down
                if (signatureFile) {
                    yPosition += 20;
                }

                // CLI Name only (Date/Time/Place shown above table)
                doc.setFontSize(10);
                if (cliName) {
                    // Print CLI name value only (right aligned, no label)
                    doc.setFont(undefined, 'bold');
                    doc.text(cliName, pgWidth - 14, yPosition, { align: 'right' });
                }
            }

            function saveDocument() {
                // Save PDF
                const timestamp = new Date().toISOString().split('T')[0];
                doc.save(`Mobile_Ambush_Checking_${timestamp}.pdf`);
                showMessage('PDF generated and downloaded successfully!', 'success');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // Voice Typing Functionality
        let recognition;
        let isVoiceEnabled = false;
        let currentFocusedElement = null;

        // Check browser support for Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-IN'; // English (India)

            recognition.onstart = function() {
                document.getElementById('listeningIndicator').style.display = 'inline';
            };

            recognition.onend = function() {
                document.getElementById('listeningIndicator').style.display = 'none';
                if (isVoiceEnabled) {
                    // Restart recognition if still enabled
                    setTimeout(() => {
                        if (isVoiceEnabled) {
                            try {
                                recognition.start();
                            } catch (e) {
                                console.log('Recognition restart error:', e);
                            }
                        }
                    }, 100);
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'no-speech') {
                    // Ignore no-speech errors and continue
                    return;
                }
                if (event.error === 'aborted') {
                    return;
                }
                document.getElementById('listeningIndicator').style.display = 'none';
            };

            recognition.onresult = function(event) {
                if (!currentFocusedElement) return;

                let finalTranscript = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    // Append final transcript to the current value in CAPITAL LETTERS
                    const currentValue = currentFocusedElement.value || '';
                    currentFocusedElement.value = currentValue + finalTranscript.toUpperCase();
                }
            };
        }

        function toggleVoiceTyping() {
            const toggle = document.getElementById('voiceToggle');
            const status = document.getElementById('voiceStatus');
            isVoiceEnabled = toggle.checked;

            if (isVoiceEnabled) {
                if (recognition) {
                    status.textContent = 'ON';
                    status.classList.add('voice-active');
                    showMessage('Voice typing enabled. Click on any text field and start speaking.', 'success');
                    setupVoiceListeners();
                } else {
                    toggle.checked = false;
                    isVoiceEnabled = false;
                    showMessage('Voice typing is not supported in your browser. Please use Chrome or Edge.', 'error');
                }
            } else {
                status.textContent = 'OFF';
                status.classList.remove('voice-active');
                document.getElementById('listeningIndicator').style.display = 'none';
                if (recognition) {
                    recognition.stop();
                }
                removeVoiceListeners();
                showMessage('Voice typing disabled.', 'success');
            }
        }

        function setupVoiceListeners() {
            // Add focus listeners to all text inputs and textareas
            const inputs = document.querySelectorAll('input[type="text"], textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', handleInputFocus);
                input.addEventListener('blur', handleInputBlur);
            });
        }

        function removeVoiceListeners() {
            const inputs = document.querySelectorAll('input[type="text"], textarea');
            inputs.forEach(input => {
                input.removeEventListener('focus', handleInputFocus);
                input.removeEventListener('blur', handleInputBlur);
            });
        }

        function handleInputFocus(event) {
            if (!isVoiceEnabled) return;
            currentFocusedElement = event.target;
            try {
                recognition.start();
            } catch (e) {
                // Recognition already started
                console.log('Recognition already active');
            }
        }

        function handleInputBlur(event) {
            // Don't stop recognition on blur, keep it running for next field
        }

        // Save Draft Functionality
        function saveDraft() {
            const draftData = {
                formDate: document.getElementById('formDate').value || '',
                formTime: document.getElementById('formTime').value || '',
                formPlace: document.getElementById('formPlace').value || '',
                otherRemarks: document.getElementById('otherRemarks').value || '',
                cliName: document.getElementById('cliName').value || '',
                tableData: []
            };

            // Get all table rows
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row) => {
                const cells = row.querySelectorAll('input, select, textarea');
                draftData.tableData.push({
                    trainNo: cells[0].value || '',
                    locoNo: cells[1].value || '',
                    upDn: cells[2].value || '',
                    lineNo: cells[3].value || '',
                    arrival: cells[4].value || '',
                    rsHolding: cells[5].value || '',
                    remarks: cells[6].value || ''
                });
            });

            // Convert to JSON and download
            const dataStr = JSON.stringify(draftData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            link.download = `draft_rs_valve_${timestamp}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            showMessage('Draft saved successfully!', 'success');
        }

        // Upload Draft Functionality
        function uploadDraft(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const draftData = JSON.parse(e.target.result);

                    // Fill in the form fields
                    document.getElementById('formDate').value = draftData.formDate || '';
                    document.getElementById('formTime').value = draftData.formTime || '';
                    document.getElementById('formPlace').value = draftData.formPlace || '';
                    document.getElementById('otherRemarks').value = draftData.otherRemarks || '';
                    document.getElementById('cliName').value = draftData.cliName || '';

                    // Clear existing table rows
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = '';

                    // Add rows from draft data
                    draftData.tableData.forEach((rowData, index) => {
                        const newRow = document.createElement('tr');
                        newRow.innerHTML = `
                            <td class="row-number">${index + 1}</td>
                            <td><input type="text" value="${rowData.trainNo || ''}"></td>
                            <td><input type="text" value="${rowData.locoNo || ''}"></td>
                            <td><input type="text" value="${rowData.upDn || ''}"></td>
                            <td><input type="text" value="${rowData.lineNo || ''}"></td>
                            <td><input type="text" value="${rowData.arrival || ''}"></td>
                            <td><select>
                                <option value="">Select</option>
                                <option value="YES" ${rowData.rsHolding === 'YES' ? 'selected' : ''}>YES</option>
                                <option value="NO" ${rowData.rsHolding === 'NO' ? 'selected' : ''}>NO</option>
                            </select></td>
                            <td><textarea rows="2">${rowData.remarks || ''}</textarea></td>
                        `;
                        tableBody.appendChild(newRow);
                    });

                    rowCount = draftData.tableData.length;
                    showMessage('Draft uploaded and loaded successfully!', 'success');

                } catch (error) {
                    console.error('Error parsing draft:', error);
                    showMessage('Error loading draft file. Please check the file format.', 'error');
                }
            };
            reader.readAsText(file);

            // Reset file input
            event.target.value = '';
        }
    </script>
